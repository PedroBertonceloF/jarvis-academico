<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JARVIS Acadêmico — copiloto de estudos com RAG, tool calling e LLM remota." />
    <meta name="theme-color" content="#2B2B2B" />
    <meta property="og:title" content="JARVIS Acadêmico" />
    <meta property="og:description" content="Copiloto acadêmico com temas claro e escuro, RAG, tool calling e evidências técnicas." />
    <meta property="og:image" content="/brand/social-preview.svg" />
    <link rel="icon" href="/brand/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/brand/favicon.ico" sizes="any" />
    <link rel="icon" href="/brand/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/brand/jarvis-app-icon-192.png" />
    <title>JARVIS Acadêmico</title>
  </head>
  <body>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('jarvis-theme');
          const theme = saved === 'light' ? 'light' : 'dark';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
