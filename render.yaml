services:
  - type: web
    name: jarvis-academico
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: LLM_MODE
        value: mock
      - key: GEMMA_BASE_URL
        value: https://llm.liaufms.org/v1/gemma-3-12b-it
      - key: GEMMA_MODEL
        value: google/gemma-3-12b-it
      - key: EMBEDDING_MODEL
        value: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - key: RAG_MODE
        value: lexical
      - key: PYTHONUNBUFFERED
        value: "1"
